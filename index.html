<!DOCTYPE html>
<html lang="en">

<head>
  <meta name="description" content="Jsw08's homepage" />
  <meta charset="utf-8">
  <title>Redirect to homepage</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="author" content="Jsw08">
  <link rel="stylesheet" href="css/style.css">
  <script src="http://code.jquery.com/jquery-latest.min.js"></script>
</head>

<body onload='pageRedirect();'>


<script>
function pageRedirect() {
  window.location.replace("https://jsw08.github.io/startpage");
}      
setTimeout("pageRedirect()", 200);  
  
window.addEventListener("keydown", function(event) {
  var key = event.key;
  if (key == 'e') {
    window.location.replace("https://google.com");
  }
}, true);


</script>

</body>
</html>
